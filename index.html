<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
   <form>
     <fieldset>
        <legend>User Info</legend>
        <label for="nam">Name:</label> 
        <input type="text" id="nam" name="fname" placeholder="Your Name" required>
        <br><br>
        <label for="emal">Email:</label>
        <input type="email" id="emal" name="Email" placeholder="Enter Email" required>
        <br><br>
        <label for="phone #">Phone #:</label>
        <input type="number" id="phone #" name="Phone #" placeholder="Enter Phone #" required>
        <br><br>
        <label for="Password">Password:</label>
        <input type="password" id="Password" name="Password" placeholder="Enter Password" required >
     </fieldset>
     <fieldset>
        <legend>User other Info</legend>
        <label>Gender:</label>
         <input type="radio" value="gender" id="Male" name="Gender" >
        <label for="Male">Male:</label>

        <input type="radio" value="gender" id="Female" name="Gender" >
        <label for="Female">Female:</label>

        <input type="radio" value="gender" id="Other" name="Gender" >
        <label for="Other">Other:</label>
        <br><br>
        <label for="DOB">DOB:</label>
        <input type="month" id="DOB" name="DOB" required>
       <br><br>
       <label for="School name">School Name :</label>
       <input type="text" id="School name" name="School Name" placeholder="Enter School Name" required>
       <br><br>
       <label for="Board">Board</label>
       <select name="Board" id="Board" >
        <option value=""disabled Selected>Select Department</option>
        <option value="Punjab">Punjab</option>
        <option value="Sindh">Sindh</option>
        <option value="Balochistan">Balochistan</option>
        <option value="Bahawalpur">Bahawalpur</option>
       </select>
       
     </fieldset>
     <br><br>
     <button>Submit</button>
     </form>
     
</body>
</html>
